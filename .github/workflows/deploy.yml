name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 30m
          script: |
            cd ~/TaleX-FE-KLTN
            git pull origin main

            # Create .env.local from GitHub Secrets
            cat > .env.local << ENVEOF
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}
            ENVEOF

            sed -i 's/^[[:space:]]*//' .env.local

            # Only install deps when package.json changed
            if ! diff -q package.json /tmp/talex-fe-pkg.json 2>/dev/null; then
              npm ci --prefer-offline
              cp package.json /tmp/talex-fe-pkg.json
            fi

            # Clean old build cache to prevent disk bloat
            rm -rf .next

            # Build Next.js
            npm run build

            # Graceful restart (no downtime if already running)
            pm2 restart talex-fe --update-env 2>/dev/null || \
              pm2 start npm --name "talex-fe" -- start -- -p 3000
            pm2 save

            # Health check — wait up to 60s
            echo "Waiting for frontend health check..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:3000 > /dev/null 2>&1; then
                echo "Frontend is healthy!"
                exit 0
              fi
              echo "  attempt $i/12..."
              sleep 5
            done
            echo "WARNING: Frontend health check failed after 60s"
